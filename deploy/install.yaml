apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtx-lab-operator
  namespace: smtx-lab-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
      app.kubernetes.io/name: smtx-lab-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/name: smtx-lab-operator
    spec:
      containers:
      - args:
        - --leader-elect
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SMTX_PROBE_IMAGE
          value: registry.cn-hangzhou.aliyuncs.com/smtxlab/smtx-lab-operator:v0.2.1
        image: registry.cn-hangzhou.aliyuncs.com/smtxlab/smtx-lab-operator:v0.2.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: healthz
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      serviceAccountName: smtx-lab-operator
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: smtx-lab-agent
  namespace: smtx-lab-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: node-agent
      app.kubernetes.io/name: smtx-lab-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/component: node-agent
        app.kubernetes.io/name: smtx-lab-agent
    spec:
      containers:
      - env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HOST_PROC
          value: /host/proc
        - name: BIND_ADDRESS
          value: :18080
        image: registry.cn-hangzhou.aliyuncs.com/smtxlab/smtx-lab-agent:v0.2.1
        imagePullPolicy: IfNotPresent
        name: agent
        ports:
        - containerPort: 18080
          hostPort: 18080
          name: http

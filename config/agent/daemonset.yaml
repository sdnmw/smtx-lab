apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: smtx-lab-agent
  namespace: smtx-lab-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: smtx-lab-agent
      app.kubernetes.io/component: node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smtx-lab-agent
        app.kubernetes.io/component: node-agent
    spec:
      serviceAccountName: smtx-lab-agent
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: registry.cn-hangzhou.aliyuncs.com/smtxlab/smtx-lab-agent:v0.2.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_PROC
              value: /host/proc
            - name: BIND_ADDRESS
              value: :18080
          ports:
            - name: http
              containerPort: 18080
              hostPort: 18080
          volumeMounts:
            - name: cni-config
              mountPath: /host/etc/cni/net.d
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: xtables-lock
              mountPath: /run/xtables.lock
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: cni-config
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
